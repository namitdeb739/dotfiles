## Atuin config — managed by dotfiles (stowed to ~/.config/atuin/config.toml)
## Full reference: https://docs.atuin.sh/configuration/config/

## Search only history from the current session by default; use Ctrl-R for global
filter_mode = "global"

## Use fuzzy search in the TUI
search_mode = "fuzzy"

## Show frequency of commands in search results
show_help = true

## Don't record these noisy one-word commands
history_filter = [
  "^ls$",
  "^ll$",
  "^la$",
  "^cd$",
  "^cd \\.\\..*",
  "^clear$",
  "^c$",
  "^pwd$",
  "^exit$",
  "^reload$",
]

## Show preview of the selected command
show_preview = true

## Max history entries to keep (0 = unlimited)
max_history_length = 0

## Sync interval in seconds (if using atuin sync)
sync_frequency = "1h"
