# CI for dotfiles — validates scripts, configs, and bootstrap
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          ignore_paths: 'zsh'
          additional_files: 'bootstrap.sh check-github-managed.sh'

  markdown-links:
    name: Validate markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate local markdown links
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          md_files = [
              p
              for p in Path('.').rglob('*.md')
              if '.git' not in p.parts
          ]
          # Match inline markdown links: [text](target)
          link_re = re.compile(r'\[[^\]]+\]\(([^)]+)\)')
          failures = []

          def is_external(target: str) -> bool:
              lowered = target.lower()
              return (
                  lowered.startswith('http://')
                  or lowered.startswith('https://')
                  or lowered.startswith('mailto:')
                  or lowered.startswith('#')
                  or '://' in lowered
              )

          for md in md_files:
              text = md.read_text(encoding='utf-8', errors='ignore')
              for lineno, line in enumerate(text.splitlines(), start=1):
                  for raw_target in link_re.findall(line):
                      target = raw_target.strip()

                      # Ignore title suffixes: path "title"
                      if ' "' in target:
                          target = target.split(' "', 1)[0].strip()

                      # Ignore angle-wrapped targets: <path>
                      if target.startswith('<') and target.endswith('>'):
                          target = target[1:-1].strip()

                      # Remove anchors
                      if '#' in target:
                          target = target.split('#', 1)[0]

                      if not target or is_external(target):
                          continue

                      resolved = (md.parent / target).resolve()
                      if not resolved.exists():
                          failures.append((md.as_posix(), lineno, raw_target))

          if failures:
              print('Broken local markdown links found:')
              for path, line, target in failures:
                  print(f'- {path}:{line} -> {target}')
              sys.exit(1)

          print(f'OK: validated local links in {len(md_files)} markdown files')
          PY

  validate-json:
    name: Validate JSON configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate hook JSON files
        run: |
          find github/.github/hooks -name '*.json' -exec sh -c '
            for f; do
              echo "Validating: $f"
              python3 -c "import json; json.load(open(\"$f\"))" || exit 1
            done
          ' _ {} +

      - name: Validate MCP config
        run: |
          if [ -f mcp/.mcp.json ]; then
            python3 -c "import json; json.load(open('mcp/.mcp.json'))"
            echo "mcp/.mcp.json is valid JSON"
          fi

  bootstrap-smoke:
    name: Bootstrap smoke test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stow
        run: brew install stow

      - name: Run bootstrap
        run: |
          chmod +x bootstrap.sh check-github-managed.sh
          ./bootstrap.sh

      - name: Verify symlinks
        run: |
          test -L ~/.gitconfig && echo "OK: ~/.gitconfig is symlinked"
          test -L ~/.github && echo "OK: ~/.github is symlinked"
          grep -q "Namit Deb" ~/.gitconfig && echo "OK: gitconfig has correct user"
