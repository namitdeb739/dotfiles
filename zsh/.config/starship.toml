# Starship prompt configuration
# Docs: https://starship.rs/config/

# Timeout for commands that starship executes (ms)
command_timeout = 500

# Newline between prompt lines
add_newline = true

# Prompt format
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[directory]
truncation_length = 3
truncation_symbol = ".../"
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕↑${ahead_count}↓${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"

[python]
symbol = " "
style = "bold yellow"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[nodejs]
symbol = " "
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[docker_context]
symbol = " "
style = "bold blue"
only_with_files = true

[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "took [$duration]($style) "
