"$schema" = 'https://starship.rs/config-schema.json'

# Tokyo Night palette, customized for Python/Git/Docker/Node dev
# Palette: #a3aed2 (light), #769ff0 (blue), #394260 (dark blue), #212736 (darker), #1d2230 (darkest)

format = """
[░▒▓](#a3aed2)\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
$git_state\
[](fg:#394260 bg:#212736)\
$python\
$nodejs\
$docker_context\
$package\
[](fg:#212736 bg:#1d2230)\
$cmd_duration\
$jobs\
$direnv\
[ ](fg:#1d2230)\
\n$character"""

# --- Prompt character ---

[character]
success_symbol = "[❯](bold #769ff0)"
error_symbol = "[❯](bold #f7768e)"

# --- Directory ---

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Developer" = " "

# --- Git ---

[git_branch]
symbol = " "
style = "bg:#394260"
format = '[[ $symbol$branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](bg:#394260)]($style)'
ahead = "[⇡${count}](fg:#9ece6a bg:#394260)"
behind = "[⇣${count}](fg:#f7768e bg:#394260)"
diverged = "[⇕⇡${ahead_count}⇣${behind_count}](fg:#e0af68 bg:#394260)"
modified = "[!${count}](fg:#e0af68 bg:#394260)"
staged = "[+${count}](fg:#9ece6a bg:#394260)"
untracked = "[?${count}](fg:#bb9af7 bg:#394260)"
stashed = "[*${count}](fg:#7aa2f7 bg:#394260)"
deleted = "[✘${count}](fg:#f7768e bg:#394260)"
renamed = "[»${count}](fg:#e0af68 bg:#394260)"
conflicted = "[=${count}](fg:#f7768e bg:#394260)"

[git_state]
style = "bg:#394260"
format = '[[ $state( $progress_current/$progress_total) ](fg:#e0af68 bg:#394260)]($style)'
rebase = " REBASING"
merge = " MERGING"
revert = " REVERTING"
cherry_pick = " CHERRY"
bisect = " BISECTING"
am = " AM"
am_or_rebase = " AM/REBASE"

[git_metrics]
disabled = true

# --- Python ---

[python]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol$version( \($virtualenv\)) ](fg:#769ff0 bg:#212736)]($style)'
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "uv.lock"]

# --- Node.js ---

[nodejs]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol$version ](fg:#769ff0 bg:#212736)]($style)'
detect_files = ["package.json", ".nvmrc", ".node-version"]

# --- Docker ---

[docker_context]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol$context ](fg:#769ff0 bg:#212736)]($style)'
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# --- Package version ---

[package]
symbol = "󰏗 "
style = "bg:#212736"
format = '[[ $symbol$version ](fg:#769ff0 bg:#212736)]($style)'
display_private = true

# --- Command duration ---

[cmd_duration]
min_time = 2_000
style = "bg:#1d2230"
format = '[[ 󱎫 $duration ](fg:#a0a9cb bg:#1d2230)]($style)'

# --- Background jobs ---

[jobs]
symbol = "✦ "
style = "bg:#1d2230"
format = '[[ $symbol$number ](fg:#e0af68 bg:#1d2230)]($style)'
number_threshold = 1

# --- Direnv ---

[direnv]
style = "bg:#1d2230"
format = '[[ 󰒍 direnv ](fg:#a0a9cb bg:#1d2230)]($style)'
detect_files = [".envrc"]

