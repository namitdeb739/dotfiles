"$schema" = 'https://starship.rs/config-schema.json'

# Tokyo Night layout (separators) + Nerd Font symbols
# Palette inspired by VS Code: Dracula Theme Soft

format = """
[‚ĖĎ‚Ėí‚Ėď](#7b7f8b)\
[ ÓúĎ ](bg:#7b7f8b fg:#191a21)\
[Óāī](bg:#bf9eee fg:#7b7f8b)\
$directory\
[Óāī](fg:#bf9eee bg:#44475a)\
$git_branch\
$git_status\
$git_state\
[Óāī](fg:#44475a bg:#282a36)\
$python\
$nodejs\
$docker_context\
$package\
[Óāī](fg:#282a36 bg:#191a21)\
$cmd_duration\
$jobs\
$direnv\
$time\
[Óāī ](fg:#191a21)\
\n$character"""

# --- Prompt character ---

[character]
success_symbol = "[‚ĚĮ](bold #62e884)"
error_symbol = "[‚ĚĮ](bold #ee6666)"

# --- Directory ---

[directory]
style = "fg:#191a21 bg:#bf9eee"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
read_only = " ůįĆĺ"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Developer" = "ÔĄ° "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

# --- Git ---

[git_branch]
symbol = "Ôźė "
style = "bg:#44475a"
format = '[[ $symbol$branch ](fg:#f49dda bg:#44475a)]($style)'

[git_status]
style = "bg:#44475a"
format = '[[($all_status$ahead_behind )](fg:#f6f6f4 bg:#44475a)]($style)'
ahead = "[ ‚á°${count}](fg:#62e884 bg:#44475a)"
behind = "[ ‚á£${count}](fg:#ee6666 bg:#44475a)"
diverged = "[ ‚áē ‚á°${ahead_count} ‚á£${behind_count}](fg:#ffb86c bg:#44475a)"
modified = "[ !${count}](fg:#ffb86c bg:#44475a)"
staged = "[ +${count}](fg:#62e884 bg:#44475a)"
untracked = "[ ?${count}](fg:#bf9eee bg:#44475a)"
stashed = "[ *${count}](fg:#97e1f1 bg:#44475a)"
deleted = "[ ‚úė${count}](fg:#ee6666 bg:#44475a)"
renamed = "[ ¬Ľ${count}](fg:#ffb86c bg:#44475a)"
conflicted = "[ =${count}](fg:#ee6666 bg:#44475a)"

[git_state]
style = "bg:#44475a"
format = '[[ $state( $progress_current/$progress_total) ](fg:#ffb86c bg:#44475a)]($style)'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY"
bisect = "BISECTING"

[git_metrics]
disabled = true

# --- Python ---

[python]
symbol = "ÓąĶ "
style = "bg:#282a36"
format = '[[ $symbol($version)( \($virtualenv\)) ](fg:#f286c4 bg:#282a36)]($style)'
detect_extensions = ["py"]
detect_files = [
    "pyproject.toml",
    "requirements.txt",
    ".python-version",
    "uv.lock",
]

# --- Node.js ---

[nodejs]
symbol = "Óúė "
style = "bg:#282a36"
format = '[[ $symbol($version) ](fg:#62e884 bg:#282a36)]($style)'
detect_files = ["package.json", ".nvmrc", ".node-version"]

# --- Docker ---

[docker_context]
symbol = "ÔĆą "
style = "bg:#282a36"
format = '[[ $symbol$context ](fg:#97e1f1 bg:#282a36)]($style)'
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# --- Package version ---

[package]
symbol = "ůįŹó "
style = "bg:#282a36"
format = '[[ $symbol($version) ](fg:#d6b4f7 bg:#282a36)]($style)'
display_private = true

# --- Command duration ---

[cmd_duration]
min_time = 2_000
style = "bg:#191a21"
format = '[[ ÔČí $duration ](fg:#bf9eee bg:#191a21)]($style)'

# --- Background jobs ---

[jobs]
symbol = "ÔÄď "
style = "bg:#191a21"
format = '[[ $symbol$number ](fg:#ffb86c bg:#191a21)]($style)'
number_threshold = 1

# --- Direnv ---

[direnv]
style = "bg:#191a21"
format = '[[ direnv ](fg:#bf9eee bg:#191a21)]($style)'
detect_files = [".envrc"]

# --- Time ---

[time]
disabled = false
time_format = "%R"                                      # Hour:Minute Format
style = "bg:#191a21"
format = '[[ Ôźļ $time ](fg:#f49dda bg:#191a21)]($style)'

